# Execute playwright tests
# Consolidated blob reports
# publish the githubg page

# Updated this file on 04/20/2026
# version 1.0

name: Playwright Tests

on:
  push:
    branches: [main, master, githubpage]
  pull_request:
    branches: [main, master, githubpage]

jobs:
  test:
    name: Run Playwright Shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Verify Playwright version
        run: npx playwright --version

      - name: Run Playwright tests (shard)
        continue-on-error: true
        run: |
          npx playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }}/4 \
            --workers=2 \
            --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report


  merge-and-deploy:
    name: Merge + Deploy Report
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write

    environment:
      name: github-pages
      url: ${{ steps.deploy_pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - name: Prepare blobs safely
        run: |
          mkdir -p merged-blobs

          find all-blob-reports -name '*.zip' -exec cp {} merged-blobs/ \;

          echo "==== BLOBS ===="
          ls -l merged-blobs

          COUNT=$(ls merged-blobs/*.zip 2>/dev/null | wc -l || echo 0)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No blob reports found → tests likely failed"
            exit 254
          fi

      - name: Merge reports
        run: |
          npx playwright merge-reports \
            --reporter html \
            merged-blobs

      - name: Validate report
        run: |
          ls -R playwright-report

          test -f playwright-report/index.html || exit 254

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Add GitHub summary
        run: |
          echo "## 🧪 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Sharded execution completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Reports merged successfully" >> $GITHUB_STEP_SUMMARY

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deploy_pages
        uses: actions/deploy-pages@v4

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy_pages.outputs.page_url }}";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Playwright Report\n\n🔗 ${url}`
            });
