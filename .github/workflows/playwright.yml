# Execute playwright tests
# Consolidated blob reports
# publish the githubg page

# Updated this file on 04/20/2026

name: Playwright Tests

on:
  push:
    branches: [main, master, pdf, githubpage]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y curl ca-certificates unzip
          npm ci || npm install

      - name: Run Playwright tests (shard)
        continue-on-error: true
        run: |
          npx playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }}/4 \
            --workers=2 \
            --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 7


  merge-and-deploy:
    name: Merge + Deploy Report
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write

    environment:
      name: github-pages
      url: ${{ steps.deploy_pages.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - name: Prepare blob reports safely
        run: |
          mkdir -p merged-blobs

          echo "==== DOWNLOADED FILES ===="
          find all-blob-reports -type f || true

          find all-blob-reports -name '*.zip' -exec cp {} merged-blobs/ \;

          echo "==== MERGED BLOBS ===="
          ls -l merged-blobs || true

          COUNT=$(ls merged-blobs/*.zip 2>/dev/null | wc -l || echo 0)

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No blob reports found. Merge cannot continue."
            exit 1
          fi

      - name: Install Playwright (required for merge)
        run: |
          npm ci || npm install
          npx playwright install --with-deps

      - name: Merge reports
        run: |
          npx playwright merge-reports \
            --reporter html \
            merged-blobs

      - name: Validate report output
        run: |
          echo "==== REPORT STRUCTURE ===="
          ls -R playwright-report

          if [ ! -f "playwright-report/index.html" ]; then
            echo "❌ Merge failed: index.html missing"
            exit 1
          fi

      - name: Upload HTML report artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Add GitHub summary
        run: |
          echo "## 🧪 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Sharded execution completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Reports merged successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 Deployed to GitHub Pages" >> $GITHUB_STEP_SUMMARY

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deploy_pages
        uses: actions/deploy-pages@v4

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy_pages.outputs.page_url }}";

            const body = `## 🧪 Playwright Report

            ✅ Sharded tests completed  
            📦 Reports merged successfully  

            🔗 **View Report:** ${url}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
