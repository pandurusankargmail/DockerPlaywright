name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    # Run 4 shards in parallel (matrix), each shard will run with 2 workers (-w 2)
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Use Playwright official Docker image to speed up browser startup and avoid installing browsers on each run
    # Use the `latest` tag to avoid image-not-found errors for specific version+variant tags.
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Install bun and dependencies
        run: |
          # ensure unzip is available for bun installer
          apt-get update && apt-get install -y unzip curl ca-certificates && rm -rf /var/lib/apt/lists/* || true
          # install bun for the runner and add to PATH
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version
          bun install

      - name: Run Playwright shard
        # Each matrix job runs a shard: ${matrix.shard}/4, using 2 workers (--workers)
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx playwright test --project=chromium --shard=${{ matrix.shard }}/4 --workers=2 --reporter=dot

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30