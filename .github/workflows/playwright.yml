name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install bun and dependencies
        run: |
          apt-get update && apt-get install -y unzip curl ca-certificates && rm -rf /var/lib/apt/lists/* || true
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun install

      - name: Run Playwright tests (shard)
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }}/4 \
            --workers=2 \
            --reporter=blob

      # ✅ FIXED HERE
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/*.zip
          retention-days: 7

  merge-reports:
    name: Merge Playwright Reports
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      # ✅ DEBUG
      - name: Debug downloaded files
        run: find all-blob-reports -type f

      # ✅ CRITICAL FIX
      - name: Prepare blob reports
        run: |
          mkdir merged-blobs
          find all-blob-reports -name '*.zip' -exec cp {} merged-blobs/ \;

      - name: Install dependencies
        run: npm ci

      # ✅ Merge reports into single HTML report
      - name: Merge into HTML report
        run: |
          npx playwright merge-reports \
            --reporter html \
            ./merged-blobs

      - name: Upload consolidated HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy-report:
    name: Deploy Playwright Report to GitHub Pages
    needs: merge-reports
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - name: Download merged report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - uses: actions/deploy-pages@v4
