# Execute playwright tests
# Consolidated blob reports
# publish the githubg page

# Updated this file on 04/20/2026

name: Playwright Tests

on:
  push:
    branches: [main, master, pdf, githubpage]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install bun and dependencies
        run: |
          apt-get update && apt-get install -y curl ca-certificates
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun install

      - name: Run Playwright tests (shard)
        continue-on-error: true
        run: |
          export PATH="$HOME/.bun/bin:$PATH"

          bunx playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }}/4 \
            --workers=2 \
            --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 7


  merge-and-deploy:
    name: Merge + Deploy Report
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - name: Flatten blob reports
        run: |
          mkdir merged-blobs
          find all-blob-reports -name '*.zip' -exec cp {} merged-blobs/ \;

          echo "==== BLOBS ===="
          ls -l merged-blobs

          COUNT=$(ls merged-blobs/*.zip 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "❌ No blob reports found!"
            exit 1
          fi

      - name: Install dependencies
        run: |
          npm ci || npm install
          npx playwright install --with-deps

      - name: Merge reports
        run: |
          npx playwright merge-reports \
            --reporter html \
            --output playwright-report \
            ./merged-blobs

      - name: Validate report
        run: |
          echo "==== REPORT ===="
          ls -R playwright-report

          if [ ! -f "playwright-report/index.html" ]; then
            echo "❌ Merge failed: index.html missing"
            exit 1
          fi

      - name: Upload HTML report (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # ✅ Add summary to GitHub UI
      - name: Add test summary
        run: |
          echo "## 🧪 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Sharded execution completed" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Reports merged successfully" >> $GITHUB_STEP_SUMMARY

      # ✅ Setup Pages
      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ✅ PR Comment
      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deployment.outputs.page_url }}";

            const body = `## 🧪 Playwright Report

            ✅ Sharded tests completed and merged.

            🔗 **View Full Report:** ${url}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ✅ IMPORTANT: add id
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
