# Execute playwright tests
# Consolidated blob reports
# publish the githubg page

# Updated this file on 04/23/2026
# version 1.0

name: Playwright Tests

on:
  push:
    branches: [main, master, pdf, githubpage]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y curl ca-certificates unzip
          npm ci || npm install

      - name: Run Playwright tests (shard)
        continue-on-error: true
        run: |
          npx playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }}/4 \
            --workers=2 \
            --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report
          retention-days: 7
