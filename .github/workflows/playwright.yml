name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Run Playwright Shards
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    timeout-minutes: 60

    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble

    env:
      CI: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install bun and dependencies
        run: |
          apt-get update && apt-get install -y unzip curl ca-certificates && rm -rf /var/lib/apt/lists/* || true
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          bun --version
          bun install

      - name: Run Playwright tests (shard)
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bunx playwright test \
            --project=chromium \
            --shard=${{ matrix.shard }}/4 \
            --workers=2 \
            --reporter=blob

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 7

  merge-reports:
    name: Merge Playwright Reports
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports

      - name: Install dependencies
        run: npm ci

      - name: Merge into HTML report
        run: |
          npx playwright merge-reports \
            --reporter html \
            ./all-blob-reports

      - name: Upload consolidated HTML report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
